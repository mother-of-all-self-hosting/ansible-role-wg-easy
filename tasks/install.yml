---
- name: Ensure WireGuard Easy paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ wg_easy_uid }}"
    group: "{{ wg_easy_gid }}"
  with_items:
    - "{{ wg_easy_base_path }}"
    - "{{ wg_easy_data_path }}"

- name: Ensure WireGuard Easy support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ wg_easy_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ wg_easy_uid }}"
    group: "{{ wg_easy_gid }}"
  with_items:
    - env
    - labels
  register: wg_easy_support_files_result

- name: Ensure WireGuard Easy container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ wg_easy_container_image }}"
    pull: always
  register: wg_easy_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: wg_easy_container_image_pull_result_ansible_module is not failed

- name: Ensure WireGuard Easy container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ wg_easy_container_image }}"
  register: wg_easy_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: wg_easy_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in wg_easy_container_image_pull_result_command.stdout"

- name: Ensure WireGuard Easy container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ wg_easy_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: wg_easy_network_creation_result

- name: Ensure WireGuard Easy container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ wg_easy_container_network }}
  register: wg_easy_network_creation_result
  changed_when: wg_easy_network_creation_result.rc == 0
  failed_when: wg_easy_network_creation_result.rc != 0 and 'already exists' not in wg_easy_network_creation_result.stderr

- name: Ensure WireGuard Easy systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/wg-easy.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ wg_easy_identifier }}.service"
    mode: "0644"
  register: wg_easy_systemd_service_result

- name: Determine whether WireGuard Easy needs a restart
  ansible.builtin.set_fact:
    wg_easy_restart_necessary: >-
      {{
        wg_easy_support_files_result.changed | default(false)
        or wg_easy_systemd_service_result.changed | default(false)
        or wg_easy_container_image_pull_result_ansible_module.changed | default(false)
        or wg_easy_container_image_pull_result_command.changed | default(false)
      }}
